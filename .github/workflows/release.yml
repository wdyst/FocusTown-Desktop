name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebView dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # macOS signing + notarization. Only exported when the secrets exist —
      # Tauri's bundler treats a *present but empty* APPLE_CERTIFICATE as
      # "sign now" and fails, so unset secrets must not define the vars at
      # all. Full guide: docs/signing.md.
      - name: Configure Apple signing
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        env:
          HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          {
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Build and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Static CRT so Windows users don't need the VC++ redistributable
          RUSTFLAGS: ${{ matrix.platform == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
          # Windows Authenticode is configured in tauri.conf.json or via
          # Azure Trusted Signing — see docs/signing.md.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FocusTown Desktop ${{ github.ref_name }}"
          releaseBody: "Unofficial FocusTown desktop wrapper. See README for the security model."
          releaseDraft: true
          args: ${{ matrix.args }}
