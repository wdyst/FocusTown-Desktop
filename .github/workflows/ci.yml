name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebView dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Tests (navigation policy)
        run: cargo test --manifest-path src-tauri/Cargo.toml

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # audit-check expects Cargo.lock at the repo root
      - name: Expose lockfile at root
        run: cp src-tauri/Cargo.lock Cargo.lock

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Acknowledged advisories with justifications: .cargo/audit.toml
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195

      - name: Audit npm dependencies
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high
